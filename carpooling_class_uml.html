<div id="uml" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
  },
});
const diagram = `classDiagram
  class User {
    +String userId
    +String name
    +String email
    +String phone
    +String profilePicUrl
    +Boolean isVerified
    +register()
    +login()
    +updateProfile()
  }
  class Driver {
    +String licenseNumber
    +Float rating
    +createRidePool()
    +approveRequest()
    +rejectRequest()
  }
  class Rider {
    +Float rating
    +searchRides()
    +sendJoinRequest()
    +viewMatchedRides()
  }
  class RidePool {
    +String rideId
    +Location pickupLocation
    +Location dropLocation
    +DateTime departureTime
    +Int availableSeats
    +String status
    +publish()
    +cancel()
    +getMatchedRiders()
  }
  class Vehicle {
    +String vehicleId
    +String model
    +String licensePlate
    +String color
    +Int capacity
  }
  class RidePreferences {
    +Boolean smokingAllowed
    +Boolean petsAllowed
    +String musicPreference
    +Boolean femaleOnly
  }
  class JoinRequest {
    +String requestId
    +String status
    +DateTime requestedAt
    +approve()
    +reject()
  }
  class RouteMatchEngine {
    +Float matchPercentage
    +calculateMatch()
    +rankRides()
    +filterByPreferences()
  }
  class PrivacyService {
    +String maskedNumber
    +maskPhoneNumber()
    +blurProfile()
    +disconnectAfterRide()
  }
  class VoIPService {
    +String sessionId
    +initiateCall()
    +sendMessage()
    +endSession()
  }
  class LocationService {
    +Float latitude
    +Float longitude
    +shareLocation()
    +trackRide()
    +triggerSOS()
  }
  class PaymentService {
    +String transactionId
    +Float amount
    +processPayment()
    +splitCost()
    +refund()
  }

  User <|-- Driver
  User <|-- Rider
  Driver "1" --> "1" Vehicle : owns
  Driver "1" --> "*" RidePool : creates
  RidePool "1" --> "1" RidePreferences : has
  Rider "1" --> "*" JoinRequest : sends
  JoinRequest "*" --> "1" RidePool : for
  RouteMatchEngine --> RidePool : evaluates
  PrivacyService --> User : protects
  VoIPService --> RidePool : usedIn
  LocationService --> RidePool : tracks
  PaymentService --> RidePool : processes
`;
const { svg } = await mermaid.render('uml-svg', diagram);
document.getElementById('uml').innerHTML = svg;
</script>
