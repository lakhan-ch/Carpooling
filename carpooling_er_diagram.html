<style>
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#04342C',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
  },
});
const diagram = `erDiagram
  USERS {
    uuid user_id PK
    string name
    string email
    string phone_masked
    string role
    boolean is_verified
    timestamp created_at
  }
  VEHICLES {
    uuid vehicle_id PK
    uuid driver_id FK
    string model
    string license_plate
    int capacity
  }
  RIDE_POOLS {
    uuid ride_id PK
    uuid driver_id FK
    string pickup_location
    string drop_location
    datetime departure_time
    int available_seats
    string status
  }
  RIDE_PREFERENCES {
    uuid pref_id PK
    uuid ride_id FK
    boolean smoking_allowed
    boolean pets_allowed
    boolean female_only
    string music_pref
  }
  JOIN_REQUESTS {
    uuid request_id PK
    uuid rider_id FK
    uuid ride_id FK
    string status
    timestamp requested_at
  }
  ROUTE_MATCHES {
    uuid match_id PK
    uuid ride_id FK
    uuid rider_id FK
    float match_percentage
    timestamp calculated_at
  }
  PAYMENTS {
    uuid payment_id PK
    uuid ride_id FK
    uuid payer_id FK
    float amount
    string status
    timestamp paid_at
  }
  RATINGS {
    uuid rating_id PK
    uuid ride_id FK
    uuid rater_id FK
    uuid rated_id FK
    int score
    string comment
  }
  SOS_EVENTS {
    uuid sos_id PK
    uuid user_id FK
    uuid ride_id FK
    float latitude
    float longitude
    timestamp triggered_at
  }

  USERS ||--o{ RIDE_POOLS : "creates"
  USERS ||--o| VEHICLES : "owns"
  USERS ||--o{ JOIN_REQUESTS : "sends"
  RIDE_POOLS ||--|| RIDE_PREFERENCES : "has"
  RIDE_POOLS ||--o{ JOIN_REQUESTS : "receives"
  RIDE_POOLS ||--o{ ROUTE_MATCHES : "scored by"
  RIDE_POOLS ||--o{ PAYMENTS : "processed via"
  RIDE_POOLS ||--o{ RATINGS : "reviewed in"
  RIDE_POOLS ||--o{ SOS_EVENTS : "triggers"
  USERS ||--o{ ROUTE_MATCHES : "matched with"
  USERS ||--o{ RATINGS : "gives"
  USERS ||--o{ SOS_EVENTS : "initiates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
